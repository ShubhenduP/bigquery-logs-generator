template:
  name: test-remote-temp
  identifier: testremotetemp
  versionLabel: v1
  type: MonitoredService
  tags: {}
  spec:
    serviceRef: svc02remote
    environmentRef: env02remote
    type: Application
    sources:
      healthSources:
        - type: Prometheus
          identifier: prome01
          name: prome-01
          spec:
            connectorRef: account.promeacccheck
            feature: apm
            metricDefinitions:
              - metricName: Prometheus Metric
                identifier: prometheus_metric
                serviceFilter: []
                isManualQuery: true
                query: avg(up{job="cv-datagen"})
                envFilter: []
                additionalFilters: []
                groupName: v1
                sli:
                  enabled: false
                analysis:
                  riskProfile:
                    riskCategory: Performance_ResponseTime
                    thresholdTypes:
                      - ACT_WHEN_LOWER
                  liveMonitoring:
                    enabled: false
                  deploymentVerification:
                    enabled: true
                    serviceInstanceFieldName: instance
            metricPacks:
              - identifier: Custom
                metricThresholds: []
