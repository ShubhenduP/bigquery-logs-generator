template:
  name: Stage-temp-runtime
  identifier: Stagetempruntime
  versionLabel: v1
  type: Stage
  projectIdentifier: gitxtest
  orgIdentifier: default
  tags: {}
  spec:
    type: Deployment
    spec:
      deploymentType: Kubernetes
      environment:
        environmentRef: <+input>
        deployToAll: false
        environmentInputs: <+input>
        serviceOverrideInputs: <+input>
        infrastructureDefinitions: <+input>
      service:
        serviceRef: <+input>
        serviceInputs: <+input>
      execution:
        steps:
          - step:
              name: stage-step-verify
              identifier: stagestepverify
              template:
                templateRef: account.verify
                versionLabel: v1
        rollbackSteps: []
    failureStrategies:
      - onFailure:
          errors:
            - AllErrors
          action:
            type: StageRollback
