template:
  name: remote-fix-01
  identifier: remotefix01
  versionLabel: v1
  type: MonitoredService
  tags: {}
  spec:
    serviceRef: remotesvc2
    environmentRef: remoteenv01
    type: Application
    sources:
      healthSources:
        - type: Prometheus
          identifier: remoteconn01
          name: remote-conn-01
          spec:
            connectorRef: account.prometheus_connector
            feature: apm
            metricDefinitions:
              - metricName: Prometheus Metric
                identifier: prometheus_metric
                serviceFilter: []
                isManualQuery: true
                query: avg(up{job="cv-datagen"})
                envFilter: []
                additionalFilters: []
                groupName: G1
                sli:
                  enabled: false
                analysis:
                  riskProfile:
                    riskCategory: Performance_ResponseTime
                    thresholdTypes:
                      - ACT_WHEN_LOWER
                  liveMonitoring:
                    enabled: false
                  deploymentVerification:
                    enabled: true
                    serviceInstanceFieldName: instance
            metricPacks:
              - identifier: Custom
                metricThresholds: []
