template:
  name: remote-post-ff
  identifier: remotepostff
  versionLabel: v1
  type: MonitoredService
  tags: {}
  spec:
    serviceRef: svcpostff
    environmentRef: envpostff
    type: Application
    sources:
      healthSources:
        - type: Prometheus
          identifier: promepostffconn
          name: prome-post-ff-conn
          spec:
            connectorRef: account.promeacccheck
            feature: apm
            metricDefinitions:
              - metricName: Prometheus Metric
                identifier: prometheus_metric
                serviceFilter: []
                isManualQuery: true
                query: avg(up{job="cv-datagen"})
                envFilter: []
                additionalFilters: []
                groupName: ff
                sli:
                  enabled: false
                analysis:
                  riskProfile:
                    riskCategory: Performance_ResponseTime
                    thresholdTypes:
                      - ACT_WHEN_LOWER
                  liveMonitoring:
                    enabled: false
                  deploymentVerification:
                    enabled: true
                    serviceInstanceFieldName: instance
            metricPacks:
              - identifier: Custom
                metricThresholds: []
